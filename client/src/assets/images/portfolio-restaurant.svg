<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rst_terra" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C1440E"/>
      <stop offset="100%" stop-color="#D9571F"/>
    </linearGradient>
    <linearGradient id="rst_hero_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D1A08"/>
      <stop offset="100%" stop-color="#2A1005"/>
    </linearGradient>
    <linearGradient id="rst_cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFAF4"/>
      <stop offset="100%" stop-color="#F7F0E4"/>
    </linearGradient>
    <linearGradient id="rst_plate_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4EDDE"/>
      <stop offset="100%" stop-color="#E8DFC8"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="url(#rst_cream)"/>

  <!-- NAV -->
  <rect x="0" y="0" width="320" height="28" fill="#FFFFFF"/>
  <rect x="0" y="28" width="320" height="1" fill="#E8E0D0"/>

  <!-- Logo - elegant serif italic -->
  <text x="16" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#2A1005" font-weight="700" font-style="italic" letter-spacing="4">SABLE</text>
  <!-- Subtle underline -->
  <line x1="16" y1="22" x2="58" y2="22" stroke="#C1440E" stroke-width="1" opacity="0.5"/>

  <!-- Nav links -->
  <text x="128" y="18" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1.5">MENU</text>
  <text x="154" y="18" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1.5">WINE</text>
  <text x="179" y="18" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1.5">EVENTS</text>
  <text x="212" y="18" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1.5">STORY</text>

  <!-- Reserve button - outlined elegant -->
  <rect x="253" y="8" width="52" height="14" rx="1" fill="none" stroke="#C1440E" stroke-width="1.2"/>
  <text x="279" y="17" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#C1440E" font-weight="700" text-anchor="middle" letter-spacing="1">RESERVE</text>

  <!-- SPLIT HERO -->
  <!-- Left: dark rich panel -->
  <rect x="0" y="29" width="162" height="100" fill="url(#rst_hero_bg)"/>

  <!-- Decorative thin horizontal lines -->
  <line x1="16" y1="52" x2="46" y2="52" stroke="#C1440E" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="55" x2="36" y2="55" stroke="#C1440E" stroke-width="0.5" opacity="0.4"/>

  <text x="16" y="68" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#C1440E" letter-spacing="3.5">FINE DINING</text>

  <text x="14" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#FFFFFF" font-weight="700" letter-spacing="-0.3">Crafted with</text>
  <text x="14" y="103" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#D9886A" font-weight="700" letter-spacing="-0.3">intention.</text>

  <rect x="16" y="112" width="66" height="13" rx="1" fill="url(#rst_terra)"/>
  <text x="49" y="121" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#FFFFFF" font-weight="700" text-anchor="middle" letter-spacing="1">BOOK TABLE</text>

  <rect x="88" y="112" width="60" height="13" rx="1" fill="none" stroke="#88665A" stroke-width="1"/>
  <text x="118" y="121" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#C8A088" font-weight="600" text-anchor="middle" letter-spacing="0.5">VIEW MENU</text>

  <!-- Right: plate showcase - warm cream bg -->
  <rect x="162" y="29" width="158" height="100" fill="url(#rst_plate_bg)"/>
  <rect x="162" y="29" width="1" height="100" fill="#E0D4C0"/>

  <!-- Plate circle -->
  <circle cx="241" cy="80" r="46" fill="#F8F2E8"/>
  <circle cx="241" cy="80" r="46" fill="none" stroke="#E0D0B8" stroke-width="1.5"/>
  <circle cx="241" cy="80" r="38" fill="#FDFAF4"/>
  <circle cx="241" cy="80" r="38" fill="none" stroke="#E8DCC8" stroke-width="0.8"/>

  <!-- Food - elevated plating illustration -->
  <!-- Main: seared protein -->
  <ellipse cx="241" cy="82" rx="22" ry="14" fill="#8B4A2A"/>
  <ellipse cx="241" cy="80" rx="18" ry="11" fill="#A05A34"/>
  <ellipse cx="237" cy="77" rx="10" ry="7" fill="#B8703A"/>
  <!-- Sauce swipe -->
  <path d="M222 86 Q234 79 248 81 Q258 82 264 88" fill="none" stroke="#C1440E" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <!-- Garnish greens -->
  <ellipse cx="249" cy="70" rx="7" ry="4" fill="#4A7A38" opacity="0.9"/>
  <ellipse cx="242" cy="68" rx="5" ry="3" fill="#5A8A48" opacity="0.8"/>
  <ellipse cx="256" cy="74" rx="4" ry="2.5" fill="#3A6A28" opacity="0.8"/>
  <!-- Golden reduction dots -->
  <circle cx="228" cy="87" r="2.5" fill="#C8920A" opacity="0.65"/>
  <circle cx="259" cy="74" r="2" fill="#D4A020" opacity="0.6"/>
  <circle cx="263" cy="87" r="1.5" fill="#C8920A" opacity="0.5"/>
  <!-- Microgreens stems -->
  <line x1="246" y1="68" x2="244" y2="63" stroke="#5A8848" stroke-width="0.9"/>
  <line x1="250" y1="69" x2="253" y2="65" stroke="#5A8848" stroke-width="0.9"/>
  <line x1="244" y1="67" x2="241" y2="63" stroke="#4A7838" stroke-width="0.9"/>

  <!-- Stars + award text below plate -->
  <text x="241" y="118" font-family="Helvetica, Arial, sans-serif" font-size="8" fill="#C1440E" text-anchor="middle" letter-spacing="3">★★★</text>
  <text x="241" y="126" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#A09080" text-anchor="middle" letter-spacing="1.5">MICHELIN RECOGNIZED</text>

  <!-- TONIGHT'S MENU SECTION -->
  <rect x="0" y="129" width="320" height="42" fill="#FFFFFF"/>
  <rect x="0" y="129" width="320" height="1" fill="#E8E0D0"/>

  <text x="16" y="141" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#AAAAAA" letter-spacing="2.5">TONIGHT'S MENU</text>
  <text x="274" y="141" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#C1440E" letter-spacing="0.5">Full menu →</text>

  <!-- Menu items -->
  <rect x="14" y="146" width="70" height="20" rx="3" fill="#FBF7F0"/>
  <rect x="14" y="146" width="2" height="20" rx="1" fill="url(#rst_terra)"/>
  <text x="22" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#2A1005" font-weight="700">Duck Confit</text>
  <text x="22" y="163" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#AAA">Cherry · Fennel</text>

  <rect x="90" y="146" width="70" height="20" rx="3" fill="#FBF7F0"/>
  <rect x="90" y="146" width="2" height="20" rx="1" fill="url(#rst_terra)"/>
  <text x="98" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#2A1005" font-weight="700">Seared Halibut</text>
  <text x="98" y="163" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#AAA">Saffron · Herbs</text>

  <rect x="166" y="146" width="70" height="20" rx="3" fill="#FBF7F0"/>
  <rect x="166" y="146" width="2" height="20" rx="1" fill="url(#rst_terra)"/>
  <text x="174" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#2A1005" font-weight="700">Wagyu Strip</text>
  <text x="174" y="163" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#AAA">Truffle · Bone Marrow</text>

  <rect x="242" y="146" width="64" height="20" rx="3" fill="#FBF7F0"/>
  <rect x="242" y="146" width="2" height="20" rx="1" fill="url(#rst_terra)"/>
  <text x="250" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#2A1005" font-weight="700">Citrus Tart</text>
  <text x="250" y="163" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#AAA">Lavender · Cream</text>

  <!-- FOOTER -->
  <rect x="0" y="171" width="320" height="29" fill="#2A1005"/>
  <text x="16" y="183" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#C1440E" letter-spacing="1.5">MON–SAT 5PM–11PM · SUN 4PM–10PM</text>
  <text x="16" y="192" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#5C3A28">Reservations recommended · Private dining available</text>
  <text x="290" y="186" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#C1440E" text-anchor="end">reservations@sable.com</text>
</svg>
