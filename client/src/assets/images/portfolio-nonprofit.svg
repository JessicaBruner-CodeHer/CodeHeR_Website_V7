  <rect x="158" y="31" width="162" height="100" fill="url(#np_cream)"/>
  <rect x="158" y="31" width="1" height="100" fill="#E0D8CC"/>

  <text x="239" y="47" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#1A8A78" text-anchor="middle" letter-spacing="2" font-weight="700">2024 IMPACT REPORT</text>
  <line x1="170" y1="51" x2="308" y2="51" stroke="#E0D8CC" stroke-width="1"/>

  <!-- Stat card 1 -->
  <rect x="166" y="56" width="66" height="42" rx="4" fill="#FFFFFF"/>
  <rect x="166" y="56" width="66" height="42" rx="4" fill="none" stroke="#E0D8CC" stroke-width="1"/>
  <rect x="166" y="56" width="66" height="4" rx="2" fill="url(#np_teal)"/>
  <text x="199" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#0E5E52" font-weight="700" text-anchor="middle">14K</text>
  <text x="199" y="83" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#AAA" text-anchor="middle" letter-spacing="0.5">PEOPLE SERVED</text>
  <!-- Tiny sparkline -->
  <polyline points="172,94 178,92 184,90 190,87 196,89 202,85 208,82 214,84 220,80 226,82" fill="none" stroke="#1A8A78" stroke-width="1" opacity="0.5"/>

  <!-- Stat card 2 -->
  <rect x="238" y="56" width="66" height="42" rx="4" fill="url(#np_stat_teal)"/>
  <text x="271" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#FFFFFF" font-weight="700" text-anchor="middle">91%</text>
  <text x="271" y="83" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#9FDED8" text-anchor="middle" letter-spacing="0.5">JOB PLACEMENT</text>
  <polyline points="244,94 250,92 256,88 262,86 268,88 274,83 280,80 286,82 292,78 298,80" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>

  <!-- Stat row 2 -->
  <rect x="166" y="103" width="66" height="24" rx="4" fill="#FFFFFF"/>
  <rect x="166" y="103" width="66" height="24" rx="4" fill="none" stroke="#E0D8CC" stroke-width="1"/>
  <text x="199" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#0E5E52" font-weight="700" text-anchor="middle">$3.2M</text>
  <text x="199" y="122" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#AAA" text-anchor="middle">COMMUNITY INVESTMENT</text>

  <rect x="238" y="103" width="66" height="24" rx="4" fill="#FFFFFF"/>
  <rect x="238" y="103" width="66" height="24" rx="4" fill="none" stroke="#E0D8CC" stroke-width="1"/>
  <text x="271" y="115" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#0E5E52" font-weight="700" text-anchor="middle">48</text>
  <text x="271" y="122" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#AAA" text-anchor="middle">PARTNER ORGS</text>

  <!-- STORIES SECTION -->
  <rect x="0" y="131" width="320" height="42" fill="#FFFFFF"/>
  <rect x="0" y="131" width="320" height="1" fill="#E8E0D4"/>

  <text x="16" y="143" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#AAAAAA" letter-spacing="2">FEATURED STORIES</text>

  <!-- Story 1 -->
  <rect x="14" y="148" width="86" height="20" rx="4" fill="#F4EEE3"/>
  <rect x="14" y="148" width="4" height="20" rx="2" fill="url(#np_teal)"/>
  <text x="24" y="158" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#222" font-weight="700">Maria's Journey</text>
  <text x="24" y="165" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#999">South Phoenix · Employment</text>

  <!-- Story 2 -->
  <rect x="106" y="148" width="86" height="20" rx="4" fill="#F4EEE3"/>
  <rect x="106" y="148" width="4" height="20" rx="2" fill="url(#np_teal)"/>
  <text x="116" y="158" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#222" font-weight="700">Tech for All</text>
  <text x="116" y="165" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#999">Job Training · 2024</text>

  <!-- Story 3 -->
  <rect x="198" y="148" width="86" height="20" rx="4" fill="#F4EEE3"/>
  <rect x="198" y="148" width="4" height="20" rx="2" fill="url(#np_teal)"/>
  <text x="208" y="158" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#222" font-weight="700">Housing First</text>
  <text x="208" y="165" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#999">Tucson · 48 families</text>

  <!-- FOOTER -->
  <rect x="0" y="173" width="320" height="27" fill="#0E5E52"/>
  <text x="16" y="184" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#5FCAB8" letter-spacing="1.5">501(c)(3) NONPROFIT</text>
  <text x="16" y="193" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#4A9080">EIN: 45-1234567 · Arizona</text>
  <!-- Partner logos placeholder pills -->
  <rect x="182" y="178" width="28" height="10" rx="3" fill="#FFFFFF" opacity="0.1"/>
  <rect x="214" y="178" width="28" height="10" rx="3" fill="#FFFFFF" opacity="0.1"/>
  <rect x="246" y="178" width="28" height="10" rx="3" fill="#FFFFFF" opacity="0.1"/>
  <rect x="278" y="178" width="28" height="10" rx="3" fill="#FFFFFF" opacity="0.1"/>
</svg>
