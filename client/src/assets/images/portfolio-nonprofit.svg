<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="np_teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A8A78"/>
      <stop offset="100%" stop-color="#22A090"/>
    </linearGradient>
    <linearGradient id="np_hero_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E5E52"/>
      <stop offset="100%" stop-color="#154D44"/>
    </linearGradient>
    <linearGradient id="np_cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF7F0"/>
      <stop offset="100%" stop-color="#F4EEE3"/>
    </linearGradient>
    <linearGradient id="np_stat_teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A8A78"/>
      <stop offset="100%" stop-color="#148070"/>
    </linearGradient>
  </defs>

  <rect width="320" height="200" fill="#FBF7F0"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="320" height="4" fill="url(#np_teal)"/>

  <!-- NAV -->
  <rect x="0" y="4" width="320" height="26" fill="#FFFFFF"/>
  <rect x="0" y="30" width="320" height="1" fill="#E8E0D4"/>

  <!-- Logo mark + name -->
  <circle cx="22" cy="17" r="7" fill="url(#np_teal)"/>
  <!-- Bridge icon inside -->
  <line x1="17" y1="20" x2="27" y2="20" stroke="#FFF" stroke-width="1.5"/>
  <path d="M17 20 Q22 14 27 20" fill="none" stroke="#FFF" stroke-width="1.5"/>
  <line x1="19" y1="14.5" x2="19" y2="20" stroke="#FFF" stroke-width="1"/>
  <line x1="25" y1="14.5" x2="25" y2="20" stroke="#FFF" stroke-width="1"/>
  <text x="33" y="15" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#0E5E52" font-weight="700" letter-spacing="1">BRIDGE</text>
  <text x="33" y="24" font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#1A8A78" letter-spacing="2.5">FOUNDATION</text>

  <!-- Nav links -->
  <text x="140" y="20" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1">MISSION</text>
  <text x="176" y="20" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1">PROGRAMS</text>
  <text x="218" y="20" font-family="Helvetica, Arial, sans-serif" font-size="6" fill="#888" letter-spacing="1">IMPACT</text>
  <rect x="255" y="10" width="50" height="14" rx="7" fill="url(#np_teal)"/>
  <text x="280" y="19" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#FFF" font-weight="700" text-anchor="middle">DONATE</text>

  <!-- LEFT: dark hero panel -->
  <rect x="0" y="31" width="158" height="100" fill="url(#np_hero_bg)"/>

  <!-- Decorative quote mark -->
  <text x="10" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="60" fill="#FFFFFF" opacity="0.06">"</text>

  <text x="16" y="53" font-family="Helvetica, Arial, sans-serif" font-size="5.5" fill="#5FCAB8" letter-spacing="3.5">SINCE 2009</text>

  <text x="14" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#FFFFFF" font-weight="700" letter-spacing="-0.3">Every person</text>
  <text x="14" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#5FCAB8" font-weight="700" letter-spacing="-0.3">deserves a</text>
  <text x="14" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#FFFFFF" font-weight="700" letter-spacing="-0.3">chance.</text>

  <rect x="16" y="113" width="60" height="13" rx="6.5" fill="url(#np_teal)"/>
  <text x="46" y="122" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#FFF" font-weight="700" text-anchor="middle">GET INVOLVED</text>

  <rect x="82" y="113" width="60" height="13" rx="6.5" fill="none" stroke="#5FCAB8" stroke-width="1"/>
  <text x="112" y="122" font-family="Helvetica, Arial, sans-serif" font-size="6.5" fill="#5FCAB8" font-weight="700" text-anchor="middle">OUR IMPACT</text>

